name: Terraform CI

on:
  pull_request: {}
  push:
    branches: 
        - master

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "latest"
          terraform_wrapper: true

      # Terraform Format & Auto-Commit
      - name: Terraform Format
        run: |
          terraform fmt -recursive
          if ! git diff --exit-code > /dev/null; then
            echo "Terraform files were reformatted. Committing changes..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: format Terraform files via CI"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git HEAD:${GITHUB_REF_NAME}
          else
            echo "All Terraform files are properly formatted."
          fi

      # Initialize Terraform
      - name: Terraform Init
        run: terraform init -input=false

      # Validate Terraform
      - name: Terraform Validate
        run: terraform validate

      # Optional: Plan
      - name: Terraform Plan
        run: terraform plan -input=false