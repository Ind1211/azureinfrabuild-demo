name: Terraform CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.6  # Change to your version

      # 3️⃣ Terraform Format Check & Auto-fix
      - name: Terraform Format
        run: |
          # Format all files
          terraform fmt -recursive
          # Check if any files are changed
          if ! git diff --exit-code > /dev/null; then
            echo "Terraform files were reformatted. Committing changes..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: format Terraform files via CI"
            git push
          else
            echo "All Terraform files are properly formatted."
          fi

      # 4️⃣ Initialize Terraform
      - name: Terraform Init
        run: terraform init -input=false

      # 5️⃣ Validate Terraform configuration
      - name: Terraform Validate
        run: terraform validate

      # 6️⃣ Optional: Run Plan (allowed for VCS-connected workspace)
      - name: Terraform Plan
        run: terraform plan -input=false